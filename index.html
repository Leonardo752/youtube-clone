<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">YouTube</div>
    <input type="text" placeholder="Pesquisar">
    <div class="user">👤</div>
  </header>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <p>🏠 Início</p>
      <p>🔥 Em alta</p>
      <p>📺 Inscrições</p>
    </aside>

    <!-- MAIN -->
    <main class="videos">

      <!-- CARD -->
      <div class="card">
        <div class="thumb"></div>
        <h3>Título do vídeo</h3>
        <p>Canal • 1M views</p>
      </div>

      <div class="card">
        <div class="thumb"></div>
        <h3>Título do vídeo</h3>
        <p>Canal • 500k views</p>
      </div>

      <div class="card">
        <div class="thumb"></div>
        <h3>Título do vídeo</h3>
        <p>Canal • 200k views</p>
      </div>

      <div class="card">
        <div class="thumb"></div>
        <h3>Título do vídeo</h3>
        <p>Canal • 900k views</p>
      </div>

    </main>

  </div>

</body>
</html>
